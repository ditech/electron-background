stages:
  - install
  - validate
  - build
  - test
  - deploy
  - release

# --- DEFAULTS ---

default:
  image: node:20.19.5
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
    policy: pull

# --- INSTALL ---
# Install project dependencies, populate the project cache for all other jobs

install:
  stage: install
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - git config --global user.email "ci@dimin.com"
    - git config --global user.name "CI/CD"
    - npm config set @dimensional-innovations:registry https://gitlab.com/api/v4/packages/npm/
    - npm config set //gitlab.com/api/v4/packages/npm/:_authToken ${CI_JOB_TOKEN}
    - npm config set //gitlab.com/api/v4/projects/:_authToken ${CI_JOB_TOKEN}
    - yarn install --frozen-lockfile
  # Override default cache config to set policy to pull-push
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
    policy: pull-push

# --- VALIDATE ---
# Run linters, audits, etc

validate_lint:
  stage: validate
  rules:
    - if: $CI_COMMIT_TAG
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: false
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: false
  script:
    - yarn lint

validate_audit:
  stage: validate
  rules:
    - if: $CI_COMMIT_TAG
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
  script:
    - |
      set +e
      OUTPUT=$(yarn audit --groups dependencies --level high 2>&1)
      echo "$OUTPUT"
      if echo "$OUTPUT" | grep -qiE "[0-9]+ (High|Critical)"; then
        echo "High or critical vulnerabilities found"
        exit 1
      fi
      echo "No high or critical vulnerabilities - passing"
      exit 0

# --- BUILD ---
# Build all projects, creating artifacts for release

build:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - yarn build
  artifacts:
    paths:
      - dist/**/*

# --- TEST ---

# --- DEPLOY ---
# Publish package

deploy_npm_publish:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    NPM_TOKEN: $NPM_TOKEN
  script:
    - |
      {
        echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'
      } >> .npmrc
    - git config --global user.email ci-cd@dimin.com
    - git config --global user.name "Dimensional Innovations"
    - npm version --no-git-tag-version --new-version $CI_COMMIT_TAG --force --allow-same-version
    - npm publish --access public

deploy_gitlab_publish:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      {
        echo '@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_SERVER_PROTOCOL}://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/'
        echo '//${CI_SERVER_HOST}/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}'
        echo '//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}'
      } >> .npmrc
    - git config --global user.email ci-cd@dimin.com
    - git config --global user.name "Dimensional Innovations"
    - npm version --no-git-tag-version --new-version $CI_COMMIT_TAG --force --allow-same-version
    - npm publish

# --- RELEASE ---
# Capture the deployment as a GitLab release tied to the version tag.

release_gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache git curl
    - curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /tmp
    - mv /tmp/git-cliff-2.12.0/git-cliff /usr/local/bin/git-cliff
  script:
    # Generate changelog for this tag only
    - git-cliff --tag ${CI_COMMIT_TAG} --unreleased --strip all > release_notes.md
    
    - |
      release-cli create \
        --name "Release ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "$(cat release_notes.md)"
